<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" role="img" aria-label="跨文化第三性别分类示意图">
  <rect width="360" height="200" fill="#f5f0eb" rx="6"/>
  <rect x="30" y="50" width="90" height="120" rx="4" fill="#e8f0f8" stroke="#2c5282" stroke-width="1.5"/>
  <rect x="135" y="50" width="90" height="120" rx="4" fill="#eef6ee" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="240" y="50" width="90" height="120" rx="4" fill="#f0ebe8" stroke="#6b4c3b" stroke-width="1.5"/>
  <text x="75" y="85" text-anchor="middle" font-size="11" fill="#2c5282">男</text>
  <text x="180" y="85" text-anchor="middle" font-size="11" fill="#2d6a4f">第三</text>
  <text x="180" y="102" text-anchor="middle" font-size="9" fill="#4a4a4a">prakriti</text>
  <text x="285" y="85" text-anchor="middle" font-size="11" fill="#6b4c3b">女</text>
  <text x="180" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a4a4a">跨文化分类并非恒定二分</text>
  <text x="180" y="175" text-anchor="middle" font-size="9" fill="#888">Hijra 等第三自然角色 [11][14]</text>
